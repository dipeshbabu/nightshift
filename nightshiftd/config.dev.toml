version = 1

[daemon]
state_dir = "/tmp/nightshiftd"
socket = "/tmp/nightshiftd.sock"
listen = "127.0.0.1:50051"

[agent_defaults]
vcpu_count = 2
mem_size_mib = 512
timeout_seconds = 300
max_concurrent = 3
sandbox = "runc"

[pool]
idle_timeout = "5m"
default_max_per_agent = 3

[containerd]
address = "/run/containerd/containerd.sock"
namespace = "nightshift"

[runtime]
default = "auto"

[runtime.firecracker]
name = "aws.firecracker"

[runtime.runc]
name = "io.containerd.runc.v2"

[network]
cni_name = "nightshift"

[images]
base = "nightshift/agent-runtime:latest"

[log]
level = "debug"
format = "text"
